{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>{% block title %}Factuurcontrole Platform{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-light-subtle">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="{% url 'dashboard_home' %}">Factuurcontrole</a>
            <div class="ms-auto d-flex gap-3 align-items-center">
                {% if request.user.is_authenticated %}
                    <span class="small text-light-emphasis">{{ request.user.username }}</span>
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                    </form>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="{% block main_class %}container{% endblock %} py-4">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <script src="{% static 'js/dashboard.js' %}?v=20260323-1"></script>
    <script>
        if (window.initReportTableSorting) {
            window.initReportTableSorting();
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
